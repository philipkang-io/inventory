name: Automated API tests using Postman CLI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
  schedule:
  - cron: '45 9 * * 1-5'

jobs:
  automated-api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Postman CLI
        run: |
          curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh
      - name: Login to Postman CLI
        run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}
      - name: Lint API Spec
        run: |
          postman spec lint "1653ec18-be81-4503-8160-44a9945dcb30" \
            --workspace-id beafefad-f971-4914-b9a7-05b51f608735 \
            --fail-severity error --output json --report-events
      - name: Run API tests
        run: |
          postman collection run "52509354-ef6894b1-edcf-4e42-8792-27c2530d9e99" \
            -e "52509354-a06b9aa5-fd9f-497d-9187-93ec85047e62" --report-events
