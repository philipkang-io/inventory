name: Automated API tests using Postman CLI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
  schedule:
  - cron: '45 9 * * 1-5'

jobs:
  automated-api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Postman CLI
        run: |
          curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh
      - name: Login to Postman CLI
        run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}
      - name: Lint API Spec
        run: |
          postman spec lint "INVENTORY_SPEC_ID" \
            --workspace-id INVENTORY_WORKSPACE_ID \
            --fail-severity error --output json --report-events
      - name: Run API tests
        run: |
          postman collection run "INVENTORY_COLLECTION_ID" \
            -e "INVENTORY_ENV_ID" --report-events
