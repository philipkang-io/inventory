apiVersion: v1
kind: Namespace
metadata:
  name: inventory
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory
  namespace: inventory
spec:
  replicas: 1
  selector:
    matchLabels: { app: inventory }
  template:
    metadata:
      labels: { app: inventory }
    spec:
      containers:
        - name: inventory
          image: inventory:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "3000"
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: inventory
  namespace: inventory
spec:
  selector: { app: inventory }
  ports:
    - name: http
      port: 3000
      targetPort: 3000
