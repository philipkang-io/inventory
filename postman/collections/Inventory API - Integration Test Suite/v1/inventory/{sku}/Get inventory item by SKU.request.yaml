$kind: http-request
url: "{{baseUrl}}/v1/inventory/:sku"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: sku
    value: "{{sku}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Response has inventory fields", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("sku");
          pm.expect(json).to.have.property("quantity");
          pm.expect(json).to.have.property("available");
      });
    language: text/javascript
order: 2000
